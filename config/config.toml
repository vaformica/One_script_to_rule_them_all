[application]
project_name = "IDtracker Pipeline"
local_project_root = "~/IDtrackerPipelineController"
database_filename = "pipeline.sqlite3"
poll_seconds = 15

[firebird]
ssh_host = "firebird"
remote_project_root = "/data/labs/vformic1-swat-lab/idtracker_pipeline"
remote_video_roots = [
  "/data/labs/vformic1-swat-lab/2026_Video"
  "/data/labs/vformic1-swat-lab/2025_Video"

]
remote_toml_roots = [
  "/data/labs/vformic1-swat-lab/2026_IDTracker_Files"
  "/data/labs/vformic1-swat-lab/2025_IDTracker_Files"

]

[commands]
# Change these to the actual commands that work in your Firebird environment.
activate_idtracker = "source ~/miniconda3/etc/profile.d/conda.sh && conda activate idtrackerai"
idtracker_command = "idtrackerai terminal_mode --load {toml_path}"
activate_postprocess = "source ~/miniconda3/etc/profile.d/conda.sh && conda activate idtrackerai"
postprocess_command = "python /data/labs/vformic1-swat-lab/software/analyze_idtracker.py --session {session_path} --output {postprocess_output}"

[slurm.idtracker]
partition = "gpu"
time = "04:00:00"
cpus = 4
memory = "32G"
gres = "gpu:1"
array_limit = 20

[slurm.postprocess]
partition = "compute"
time = "02:00:00"
cpus = 4
memory = "16G"

[results]
remote_track_globs = ["**/*track*.png", "**/*trajectory*.png"]
remote_summary_globs = ["**/*individual_summary*.csv", "**/*summary*.csv"]
